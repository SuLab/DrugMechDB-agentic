    evidence:
      - reference: PMID:12071511
        snippet: several drugs therapeutic for bipolar disorder can provide neuroprotection by inhibiting the pro-apoptotic effects of GSK-3beta, providing new evidence that dysregulation of GSK-3beta may contribute to the pathophysiology of bipolar disorder
        supports: PARTIAL
        evidence_source: IN_VITRO
        explanation: >-
          The efficacy of bipolar drugs is attributed to inhibiting GSK-3beta's
          pro-apoptotic effects, implying that apoptotic process driven by GSK-3beta
          contributes to bipolar disorder pathophysiology. Support is PARTIAL because
          "may contribute" is hedged language.
      - reference: PMID:36440772
        snippet: inhibition of glycogen synthase kinase 3 beta and inositol monophosphatase, resulting in induction of brain-derived neurotrophic factor, antiapoptotic proteins, deprivation of calcium-induced apoptosis
        supports: PARTIAL
        evidence_source: OTHER
        explanation: >-
          Lithium treats bipolar disorder by inducing antiapoptotic proteins and
          depriving calcium-induced apoptosis, supporting that apoptotic process
          is a pathological contributor to bipolar disorder.
