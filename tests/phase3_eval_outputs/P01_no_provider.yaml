links:
  - key: decreases activity of
    source: MESH:D001241
    target: UniProt:P23219
    evidence:
      - reference: PMID:23422285
        snippet: "It acetylates Ser529 residue in cyclooxygenase-1 (COX-1) and prevents thromboxane A2 (TXA2) formation from arachidonic acid (AA) in platelets."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Aspirin covalently acetylates Ser529 of platelet COX-1, irreversibly inhibiting its catalytic activity."
  - key: decreases activity of
    source: MESH:D001241
    target: UniProt:P35354
    evidence:
      - reference: PMID:36588714
        snippet: "In cancer cells, ASA and IP1867B acted by inhibiting PGE2 and TXB2 generation via the acetylation of COX-2."
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: "Aspirin (ASA) acetylates COX-2 at Serine 516, inhibiting its prostanoid-generating activity."
  - key: positively regulates
    source: UniProt:P23219
    target: GO:0001516
    evidence:
      - reference: PMID:38495101
        snippet: "All aspirin doses caused comparable % acetylation of platelet COX-1 at Serine 529 associated with similar profound inhibition of platelet-dependent thromboxane (TX)A2 generation ex vivo (serum TXB2) and in vivo (urinary TXM)."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Catalytically intact COX-1 drives platelet prostanoid biosynthesis; its acetylation by aspirin suppresses thromboxane A2 (a prostaglandin-class product) generation."
  - key: positively regulates
    source: UniProt:P35354
    target: GO:0001516
    evidence:
      - reference: PMID:36588714
        snippet: "In cancer cells, ASA and IP1867B acted by inhibiting PGE2 and TXB2 generation via the acetylation of COX-2."
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: "COX-2 activity is required for PGE2 and TXB2 (prostaglandin biosynthetic) generation; acetylation of COX-2 by aspirin reduces it."
  - key: has output
    source: GO:0001516
    target: MESH:D013928
    evidence:
      - reference: PMID:23422285
        snippet: "It acetylates Ser529 residue in cyclooxygenase-1 (COX-1) and prevents thromboxane A2 (TXA2) formation from arachidonic acid (AA) in platelets."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "TXA2 is the platelet-specific prostanoid output of COX-1-mediated arachidonic acid metabolism (the prostaglandin biosynthetic process)."
  - key: positively regulates
    source: MESH:D013928
    target: GO:0070527
    evidence:
      - reference: PMID:21844189
        snippet: "Exposing aspirin to erythrocytes blocked its ability to inhibit thromboxane A(2) synthesis and platelet aggregation."
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: "Loss of inhibition of TXA2 synthesis tracks with loss of inhibition of platelet aggregation, consistent with TXA2 driving aggregation."
  - key: contributes to
    source: GO:0070527
    target: MESH:D009203
    evidence:
      - reference: PMID:17323609
        snippet: "aspirin significantly reduced the risk of both, fatal and non-fatal myocardial infarction"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Aspirin's inhibition of platelet aggregation translates to a reduction in MI risk, indicating platelet aggregation contributes to MI."
