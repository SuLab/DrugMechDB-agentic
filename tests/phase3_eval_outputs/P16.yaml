links:
  - key: molecularly interacts with
    source: MESH:D007980
    target: UniProt:P20711
    evidence:
      - reference: PMID:14634798
        snippet: l-DOPA with the tag bonded at position 5 served as the best substrate for AADC.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Levodopa (L-DOPA) is the substrate that directly interacts with aromatic amino acid decarboxylase (AADC) at its active site; this biochemical interaction is the first step in the conversion of levodopa to dopamine.
  - key: produces
    source: UniProt:P20711
    target: MESH:D004298
    evidence:
      - reference: PMID:22061622
        snippet: recombinant human AADC, which actively catalyzes dopamine production from DOPA
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: AADC catalyzes the decarboxylation of L-DOPA (DOPA) to produce dopamine; this is the direct enzymatic product of AADC activity.
      - reference: PMID:40488810
        snippet: subsequently converted into dopamine via aromatic L-amino acid decarboxylase
        supports: SUPPORT
        evidence_source: OTHER
        explanation: Review confirming that L-DOPA is converted into dopamine by the enzyme aromatic L-amino acid decarboxylase (AADC).
  - key: positively regulates
    source: MESH:D004298
    target: GO:0001963
    evidence:
      - reference: PMID:38537648
        snippet: Dopamine's role as the principal neurotransmitter in motor functions has long been accepted.
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        explanation: Dopamine is the neurotransmitter that mediates dopaminergic synaptic transmission; its presence positively regulates this biological process.
  - key: negatively correlated with
    source: GO:0001963
    target: MESH:D010300
    evidence:
      - reference: PMID:40966690
        snippet: reduced striatal dopaminergic transmission is a transdiagnostic substrate for psychomotor retardation underlying the motor features of conditions such as Parkinson's disease
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Reduced dopaminergic synaptic transmission is the defining pathophysiological feature of Parkinson's disease motor symptoms; dopaminergic transmission is therefore negatively correlated with Parkinson's disease.
      - reference: PMID:35331828
        snippet: Parkinson's Disease (PD) occurs due to extensive damage of dopamine-producing neurons; this causes dopamine deficits in the midbrain
        supports: SUPPORT
        evidence_source: OTHER
        explanation: Review confirming that dopamine deficiency (from neuronal loss) is the pathogenic basis of PD, establishing the negative correlation between dopaminergic neurotransmission and disease.
