    target: UniProt:P31639
    evidence:
      - reference: PMID:38265382
        snippet: "Empagliflozin is a selective SGLT2 inhibitor that works by constraining glucose reabsorption in the kidneys, causing increased urinary glucose elimination."
        supports: SUPPORT
        evidence_source: OTHER
        explanation: "Pharmacological review confirming empagliflozin selectively inhibits SGLT2 activity, constraining its renal glucose reabsorption function."
  - key: positively regulates
    source: UniProt:P31639
    target: GO:0035623
    evidence:
      - reference: PMID:40041732
        snippet: "Sodium-glucose cotransporter-2 (SGLT-2) acts as a key element in the reabsorption of glucose in the kidney."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "SGLT2 is the key transporter driving renal glucose reabsorption; it positively regulates this biological process."
      - reference: PMID:41477427
        snippet: "work by blocking SGLT2 proteins in the proximal convoluted tubules of the nephrons, thereby preventing glucose reabsorption into the bloodstream."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Blocking SGLT2 prevents renal glucose reabsorption, confirming that SGLT2 positively regulates this process."
  - key: positively correlated with
    source: GO:0035623
    target: HP:0003074
    evidence:
      - reference: PMID:33085977
        snippet: "SGLT2 inhibitors are a class of oral antidiabetic drugs that lower elevated plasma glucose levels by promoting the urinary excretion of excess glucose through the inhibition of renal glucose reuptake."
        supports: SUPPORT
        evidence_source: OTHER
        explanation: "Inhibiting renal glucose reabsorption lowers plasma glucose, establishing that renal glucose reabsorption is positively correlated with blood glucose / hyperglycemia."
      - reference: PMID:34487707
        snippet: "Ipragliflozin significantly lowered blood glucose levels in mice that had prefasted for 0, 6, or 12 h, but not 18 h or more."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        explanation: "SGLT2 inhibitor-mediated reduction of renal glucose reabsorption lowers blood glucose in a blood glucose-dependent manner, supporting positive correlation between renal glucose absorption and hyperglycemia."
  - key: manifestation of
