    target: MESH:D003924
    evidence:
      - reference: PMID:24843435
        snippet: "Diabetes mellitus is a group of diseases associated with various metabolic disorders, the main feature of which is chronic hyperglycemia due to insufficient insulin action."
        supports: SUPPORT
        evidence_source: OTHER
        explanation: "Chronic hyperglycemia is the main feature (manifestation) of diabetes mellitus, including type 2 diabetes mellitus."
