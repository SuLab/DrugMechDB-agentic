    target: UniProt:P31645
    evidence:
      - reference: PMID:31480244
        snippet: Their primary mechanism of action is considered to be the increased synaptic concentration of serotonin through blockade of the serotonin transporter (SERT).
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Fluoxetine, as an SSRI, blocks SERT — decreasing the transporter's activity of removing serotonin from the synapse.
      - reference: PMID:24516100
        snippet: We show that fluoxetine binds within the central substrate site of human SERT
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Fluoxetine binds the central substrate site of SERT, competitively blocking its serotonin uptake activity.
  - key: positively regulates
