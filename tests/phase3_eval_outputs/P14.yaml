links:
  - key: has metabolite
    source: MESH:D053139
    target: CHEBI:64337
    evidence:
      - reference: PMID:16966469
        snippet: "This anti-influenza viral agent is an ester prodrug, and the antiviral activity is achieved by its hydrolytic metabolite: oseltamivir carboxylate."
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Oseltamivir is an ester prodrug; its active metabolite oseltamivir carboxylate is the entity responsible for antiviral activity.
      - reference: PMID:27228223
        snippet: Oseltamivir, an inactive anti-influenza virus prodrug, is activated (hydrolysed) in vivo by carboxylesterase 1 (CES1) to its active metabolite oseltamivir carboxylate.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Confirms oseltamivir is a prodrug and its active metabolite is oseltamivir carboxylate, supporting the has metabolite relationship.
  - key: decreases activity of
    source: CHEBI:64337
    target: UniProt:P03472
    evidence:
      - reference: PMID:39577572
        snippet: oseltamivir carboxylate or zanamivir, a competitive inhibitor of receptor-destroying neuraminidases (NAs)
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Oseltamivir carboxylate is described as a competitive inhibitor of neuraminidases (NAs), directly supporting that it decreases NA activity.
      - reference: PMID:41917408
        snippet: The neuraminidase (NA) glycoprotein of influenza virus plays a critical role in the release of progeny viruses and their spread, making it an important target for antiviral drugs.
        supports: SUPPORT
        evidence_source: OTHER
        explanation: Establishes NA as the antiviral drug target; combined with the first evidence item, confirms oseltamivir carboxylate decreases NA activity.
  - key: positively regulates
    source: UniProt:P03472
    target: GO:0019076
    evidence:
      - reference: PMID:23349854
        snippet: HA attaches to sialic acid on host cell surface receptors to initiate virus infection while NA removes these sialic acids to facilitate release of progeny virions.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: NA facilitates (positively regulates) the release of progeny virions from infected cells by removing sialic acid receptor binding.
      - reference: PMID:23028967
        snippet: influenza virus neuraminidase (NA) cleaves terminal sialic acid residues on oligosaccharide chains that are receptors for virus binding, thus playing an important role in the release of virions from infected cells to promote the spread of cell-to-cell infection.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: NA activity directly enables virion release from infected cells, confirming NA positively regulates the viral release from host cell process.
  - key: in taxon
    source: GO:0019076
    target: NCBITaxon:11520
    evidence:
      - reference: PMID:41917408
        snippet: The neuraminidase (NA) glycoprotein of influenza virus plays a critical role in the release of progeny viruses and their spread, making it an important target for antiviral drugs.
        supports: SUPPORT
        evidence_source: OTHER
        explanation: Establishes that viral release is a process specific to influenza virus, supporting the in taxon relationship between the viral release process and Influenza A virus.
      - reference: PMID:23028967
        snippet: influenza virus neuraminidase (NA) cleaves terminal sialic acid residues on oligosaccharide chains that are receptors for virus binding, thus playing an important role in the release of virions from infected cells to promote the spread of cell-to-cell infection.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: The viral release process described is occurring in the context of influenza virus, supporting this process being in the Influenza A virus taxon.
  - key: causes
    source: NCBITaxon:11520
    target: MESH:D007251
    evidence:
      - reference: PMID:42212418
        snippet: Type A viruses caused over two-thirds of cases, with variability across WHO Regions and seasons.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Influenza A (Type A) viruses are identified as the predominant causal agents of influenza cases in global surveillance, supporting the causes relationship.
      - reference: PMID:42057722
        snippet: NAIs, including oseltamivir, zanamivir, peramivir and laninamivir, block viral release, while polymerase inhibitors such as baloxavir disrupt viral RNA replication.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Reviews influenza A and B viral infections as the clinical context requiring antiviral therapy, implicitly confirming influenza A virus as causative of influenza disease.
