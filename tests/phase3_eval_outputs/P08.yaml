      - reference: PMID:33184860
        snippet: EGFR transactivation resulted in the activation of ERK1/2 and AKT.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Activated EGFR drives phosphorylation of ERK1/2 (the terminal kinases of the MAPK cascade), demonstrating that EGFR positively regulates the MAPK cascade in colorectal cancer cells.
  - key: positively regulates
