    evidence:
      - reference: PMID:30273442
        snippet: The Ras/mitogen-activated protein kinase (MAPK) pathway controls fundamental cellular processes such as proliferation, differentiation, and apoptosis.
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        explanation: MAPK pathway activity drives epithelial cell proliferation; loss of ERK1/2 negative regulation (DUSP6 KO) increases proliferation, confirming MAPK positively regulates cell population proliferation.
  - key: contributes to
