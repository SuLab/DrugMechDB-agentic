comment: The use of progesterone, progestin and similar compounds may not be superior
  to placebo in reducing premenstrual symptoms judging from the results of the majority
  of controlled trials (https://pubmed.ncbi.nlm.nih.gov/7791258/). Also note that
  it is generally agreed that neither a deficiency nor excess in progesterone/progestin
  levels is etiologically relevant to the disorder (https://pubmed.ncbi.nlm.nih.gov/16650465/).
  It's largelly accepted that SSRIs as better treatment and should be the first attempt
  for treatment of premenstrual dysphoric disorder.
