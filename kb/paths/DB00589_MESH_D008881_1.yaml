comment: Lisuride is used to prevent migraine attacks in low doses. Due to its highly
  non-selective pharmacological activity, lisuride is described as a "dirty drug".
  The exact mechanism of action of lisuride is not clear however it is likely due
  to agonism of 5-HT1B/1D receptors.
