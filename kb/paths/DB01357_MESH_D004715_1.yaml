comment: Mestranol is a biologically inactive prodrug of ethinylestradiol, which it
  is demethylated in the liver with a conversion efficiency of 70%. Mestranol is used
  as an estrogen component of many combined oral contraceptives. The combined oral
  contraceptives show efficacy in endometriosis symptoms management, but not estrogen
  component itself.
