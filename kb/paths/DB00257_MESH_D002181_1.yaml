comment: This drug is fungistatic at concetrations up to 20 mcg/mL, and is fungicidal
  in vitro when used at higher concentrations. Also please note that MESH:D002181
  was initially denoted as Candidal vulvovaginitis in the original xls file but the
  name on the MESH website, which is Candidiasis, Vulvovaginal, is the one used here
  for our annotation.
