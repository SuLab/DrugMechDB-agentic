comment: This drug seems to be used for prophylaxis only because of its high cost
  and limited efficacy (https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7096974/#CR20).
  It's believed to elicit an antibody-dependent cell-mediated cytotoxicity activity
  in vivo ()https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4000855/.
