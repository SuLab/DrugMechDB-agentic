comment: It seems that only low doses of naltrexone has been documented to enhance
  or produce an analgesic response. Low-dose naltrexone (LDN) describes the off-label
  use of naltrexone at low doses for diseases not related to chemical dependency or
  intoxication. The annotation is for Low Dose Naltrexone (LDN).
