comment: Phytomenadione promotes calcification of bones and can be supplemented together
  with calcium sources in cases of postmenopausal osteoporosis. Additionally phytomenadione
  may prevent arterial calcification in case of calcium supplementation https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4566462/
