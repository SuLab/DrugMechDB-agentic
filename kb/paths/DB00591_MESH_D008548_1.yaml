comment: Hyperpigmentation can be arise following inflammatory dermatose (https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2921758/),
  for which cases fluocinolone acetonide could be used to reduce dark spots caused
  by inflammation. Alternatively, fluocinolone acetonide when used in combination
  with two hidroquinone and tretinoin can be used to treat chloasma (https://pubmed.ncbi.nlm.nih.gov/19090343/
  and https://pubmed.ncbi.nlm.nih.gov/15732437/).
