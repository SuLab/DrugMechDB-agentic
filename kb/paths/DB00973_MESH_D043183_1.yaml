comment: The drug when in combination with clinidium (DB:DB00771, brand name Librax,
  https://go.drugbank.com/unearth/q?utf8=%E2%9C%93&searcher=drugs&query=Librax) helps
  to relieve stomach spasms and abdominal cramps, some of the symptoms of irritable
  bowel syndrome. Clinidium (an anticholinergic agent) is the compound that ameliorates
  these symptoms.
