comment: Tibolone is metabolised in the intestine and liver into 3 active metabolites,
  namely 3α- and 3β-hydroxy metabolites and Δ4-7alpha-methylnorethisterone. The first
  two metabolites bind to estrogen receptors, primarily ERα receptors, and have estrogenic
  effects on bone. There appears to have no IDs for the metabolites of tibolone in
  DrugBank, ChEBI or MESH.
