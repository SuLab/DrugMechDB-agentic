comment: Hemin (MESH:D006427) and heme (MESH:D006418) are related substances resulting
  from the parasite hemoglobin catabolism. Heme is bound to iron whereas hemin is
  the hydroxide counterpart of heme. Both are cytotoxic. Hemin is also known as hematin.
