comment: This drug could potentially modulate UniProt:P43115 as it has little selectivity.
  However, the action upon activing this target would be vasoconstriction, which would
  be contraindicated in Pulmonary arterial hypertension. This could explain the hypertension
  adverse event reported in https://www.targetvalidation.org/summary?drug=CHEMBL494.
  DrugBank has the phosphodiesterase gene family as possible targets for this drug
  but this is based on experiments where Iloprost was used in combination with phosphodiesterase
  inhibitors. So, Iloprost on its own does not modulate phosphodiesterases.
