comment: Tolvaptan is also known as aquaretic (https://en.wikipedia.org/wiki/Aquaretic).
  Note that hyponatremia corresponds to the state where water content is relatively
  large for the sodium content available (https://pubmed.ncbi.nlm.nih.gov/19322975/),
  which is possibly due to increased water reabsorption. There are different types
  of hyponatremia, and medications like tolvaptan should only be used in those patients
  with high volume or normal volume hyponatremia (https://en.wikipedia.org/wiki/Hyponatremia#Medications).
