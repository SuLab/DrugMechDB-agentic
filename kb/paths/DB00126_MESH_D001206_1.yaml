comment: The exact mechanism of action of ascorbic acid for the treatment of symptoms
  and signs of disorders caused by severe deficiency in vitamin C is unknown. However,
  administration of ascorbic acid seems to restore the body pool of ascorbic acid
  (https://www.accessdata.fda.gov/drugsatfda_docs/label/2017/209112s000lbl.pdf).
