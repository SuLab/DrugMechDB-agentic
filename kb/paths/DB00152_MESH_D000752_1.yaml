comment: Please note that the pernicious anemia is a megaloblastic anemia caused by
  vitamin B12 deficiency not thiamine deficiency. Differential diagnosis for pernicious
  anemia includes thiamine-responsive megaloblastic anemia syndrome which is treated
  high doses of thiamine
