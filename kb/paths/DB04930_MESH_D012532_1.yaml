comment: DrugBank has this drug modulating a human target/protein (https://go.drugbank.com/drugs/DB04930#mechanism-of-action)
  instead of the non-vertebrate proteome. Because humans (and other mammals) share
  similar ion channels this drug can have some toxic effects on the vertebrate host
  (e.g. https://pubmed.ncbi.nlm.nih.gov/11812616/)
