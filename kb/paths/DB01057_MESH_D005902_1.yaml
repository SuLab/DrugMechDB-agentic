comment: The drug allows for the trabecular meshwork in the eye (UBERON:0005969) to
  open, increasing the outflow of the aqueous humor and having a positive impact on
  reducing intraocular pressure. Note that MESH:C061212 is not an alternative MESH
  ID for this drug (https://meshb.nlm.nih.gov/record/ui?ui=C061212). The disease is
  also known as Open-angle glaucoma as per in DrugCentral.
