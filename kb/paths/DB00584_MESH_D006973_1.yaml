comment: Being a prodrug, enalapril is rapidly biotransformed into its active metabolite,
  enalaprilat. Please note this drug had 2 DrugBank IDs in the Drug Centarl, DB00584
  and DB09477. The DB09477 is ID for Enalapril, which has been previously curated.
