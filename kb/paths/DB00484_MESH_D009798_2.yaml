comment: UBERON:0003956 includes the uveoscleral network as well as other canals for
  aqueous humor drainage. The uveoscleral network is the structure that seems to be
  affected by alpha adrenergic agonists, such as brimonidine, specially in long-term
  treatments (i.e. chronic dosing).
