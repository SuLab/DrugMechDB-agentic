comment: In the DrugCentral the drug trometamol (tromethamine) was indicated for allergic
  conjunctivitis, however no literature evidences found about the mechanism of action
  of trometamol treating allergic conjunctivitis. For the treatment of allergic conjunctivitis
  the ketorolac tromethamine is used.
