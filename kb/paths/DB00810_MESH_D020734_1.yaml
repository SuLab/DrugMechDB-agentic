comment: The disease is also known as Parkinsonism as per the original file. Muscarinic
  antagonists can allow dopamine levels to rebalance, which can help relieve some
  Parkinsonian symptoms e.g. involuntary movements. Anticholinergic drugs may also
  be prescribed to improve bladder dysfunction (https://pubmed.ncbi.nlm.nih.gov/20370804/).
