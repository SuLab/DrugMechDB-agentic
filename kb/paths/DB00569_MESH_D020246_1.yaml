comment: The disease is also known as Deep venous thrombosis as per DrugCentral. Note
  that among the original MESH IDs for this drug one of them seems to have been deprecated
  (MESH:C438268) whereas the other (MESH:C049714) is for a compound where no evidence
  has been found to be related to fondaparinux.
