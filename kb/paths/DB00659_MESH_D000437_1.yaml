comment: Chronic alcohol exposure is believed to alter the normal balance between
  neuronal excitation and inhibition. Both in vitro and in vivo studies seem to suggest
  acamprosate may interact with glutamate and GABA neurotransmitter systems centrally,
  and has led to the hypothesis that acamprosate restores this balance (https://pubchem.ncbi.nlm.nih.gov/compound/71158#section=Mechanism-of-Action).
  The drug may not an effective therapy if be used alone (https://en.wikipedia.org/wiki/Acamprosate#Pharmacodynamics).
  Acamprosate may influence GABAA transmission via inhibition of presynaptic γ-aminobutyric
  acid type B (GABAB) receptors (https://pubmed.ncbi.nlm.nih.gov/9514305/).
