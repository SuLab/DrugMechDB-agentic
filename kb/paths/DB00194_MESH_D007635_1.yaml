comment: This disease is denoted as Herpes simplex dendritic keratitis in the original
  file as per DrugCentral. The drug needs to be converted to Vidarabine Phosphate
  first (monophosphate --> diphosphate --> triphosphate) to become active and exert
  its role as inhibitor (https://pubchem.ncbi.nlm.nih.gov/compound/21704#section=Mechanism-of-Action).
