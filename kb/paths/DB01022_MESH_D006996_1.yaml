comment: Phytomenadione promotes calcification of bones and teeth and can be supplemented
  together with calcium sources in cases of hypocalcemia. Additionally phytomenadione
  may prevent arterial calcification in case of calcium supplementation https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4566462/
