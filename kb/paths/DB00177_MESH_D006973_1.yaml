comment: Valsartan acts at the receptor level, therefore it provides a more complete
  angiotensin II antagonism since angiotensin II is generated by other enzymes as
  well as ACE. Note that valsartan does not affect the metabolism of bradykinin like
  ACE inhibitors do.
