comment: Tipiracil may also play its anti-neoplastic role indirectly when admnistered
  in combination with Trifluridine (DB:DB00432). In this case, tipiracil will prevent
  trifluridine breakdown, thus increasing its bioavailability and boosting its systemiic
  presence (https://en.wikipedia.org/wiki/Trifluridine/tipiracil).
