comment: Gimeracil is available in combination with oteracil and tegafur within the
  commercially available product "Teysuno". Gimeracil's main role within Teysuno is
  to prevent the breakdown of Fluorouracil (5-FU), which helps to maintin high enough
  concentrations for sustained effect against cancer cells.
