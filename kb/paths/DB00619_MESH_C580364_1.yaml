comment: The disease is also known as Chronic eosinophilic leukemia as per the original
  file. The malignancy is driven by FIP1L1-PDGFRA fusion genes (https://en.wikipedia.org/wiki/FIP1L1#FIP1L1-PDGFRA_fusion_genes).
