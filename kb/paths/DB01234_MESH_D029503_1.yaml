comment: Apoptosis could be the cause of the anemia in patients with this disease
  (https://pubmed.ncbi.nlm.nih.gov/8298126/) and corticosteroids appear to have an
  anti-apoptotic effect (https://www.sciencedirect.com/science/article/pii/S0006497119529913).
  More details on the mechanism of action are not available.
