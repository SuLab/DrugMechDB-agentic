comment: It's not clear how (or if at all) acetylcysteine can be used in the treatment
  of Amyloidosis. If so, it could be due to as a precursor in the formation of glutathione
  (https://en.wikipedia.org/wiki/Acetylcysteine#Chemistry), which in turn could have
  a role in depleting the occurrence of protein aggregation (https://pubmed.ncbi.nlm.nih.gov/15857408/,
  https://pubmed.ncbi.nlm.nih.gov/33758187/).
