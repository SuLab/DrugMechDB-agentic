comment: This drug is used in combination with dalfopristin. Both interfere with the
  bacterial protein synthesis, at different stages of the translation. Quinupristin
  inhibits the late phase of protein synthesis, whereas dalfopristin inhibits the
  early phase of protein synthesis in the bacterial ribosome. In combination, both
  drugs are more effective than each used individually (https://go.drugbank.com/drugs/DB01369#description).
