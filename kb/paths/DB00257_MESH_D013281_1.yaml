comment: The disease is denoted as Aphthous ulcer of mouth in the original file but
  the name used for the path is the one seen in the MESH website. The causes for this
  disease are not well known (https://ada.com/conditions/aphthous-ulcers/#causes).
  It's important to prevent secondary infection of the ulcers (https://en.wikipedia.org/wiki/Aphthous_stomatitis#Medication);
  that's when anti-bacterial agents can be administered.
