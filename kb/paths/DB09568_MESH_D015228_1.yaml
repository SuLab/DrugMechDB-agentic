comment: The main components of OM3-CA, eicosapentaenoic acid, and docosahexaenoic
  acid, are poor substrates for the enzymes responsible for the synthesis of triglycerides
  (TG). It enhances the clearance of TG from circulating VLDL particles; increased
  breakdown of fatty acids; inhibition of DAG; and increased activity of lipoprotein
  lipase in blood.
