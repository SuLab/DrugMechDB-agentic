comment: Flupentixol is not approved for use in the United States. Flupentixol exists
  in two geometric isomers, the trans(E) and pharmacologically active cis(Z) forms.It
  is generally understood that positive symptoms of schizophrenia arise from a dysregulated
  striatal dopamine pathway, leading to hyperstimulation of D2 receptors.
