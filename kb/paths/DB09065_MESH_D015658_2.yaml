comment: Cobicistat does not have any anti-HIV activity on its own; it acts as a pharmacokinetic
  enhancer by inhibiting cytochrome P450 3A isoforms (CYP3A) and therefore increases
  the systemic exposure of coadministered agents that are metabolized by CYP3A enzymes
  (https://pubchem.ncbi.nlm.nih.gov/compound/25151504#section=Mechanism-of-Action)
