comment: Ibritumomab tiuxetan is an Indium or yttrium conjugated murine IgG1 kappa
  monoclonal antibody directed against the CD20 antigen, The Fab segment of the antibody
  targets the CD20 epitope on B-cells, allowing the radioactive yttrium to destroy
  the cell via production of beta particles.
