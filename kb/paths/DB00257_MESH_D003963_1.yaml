comment: Diaper rash can be caused by different factors, including fungus, when it's
  known as diaper candidiasis. If a fungal origin is identified, the treatment is
  based on antifungals (e.g. clotrimazole). Therefore the original cause must be determined
  first as the treatments vary (https://en.wikipedia.org/wiki/Irritant_diaper_dermatitis#Secondary_infections).
