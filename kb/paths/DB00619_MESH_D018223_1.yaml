comment: The majority of dermatofibrosarcoma tumours have two genes fused due to a
  translocation involving the collagen gene (COL1A1) and the platelet-derived growth
  factor (PDGF). The latter can be further subdivided giving rise to PDGFA, for example,
  which is an oncogene.
