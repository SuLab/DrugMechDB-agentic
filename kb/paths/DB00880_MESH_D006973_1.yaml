comment: The hypotensive effects of chlorothiazide and other thiazides are not necessarily
  due to their diuretic activity (https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2904515/#S1title).
  The exact mechanism is yet not fully understood.
