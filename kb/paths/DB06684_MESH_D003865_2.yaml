comment: this drug is a partial agonist at postsynaptic 5-HT1A receptors (https://en.wikipedia.org/wiki/5-HT1A_receptor#Partial_agonists)
  and are sometimes used in low doses as augmentation to SSRIs (https://en.wikipedia.org/wiki/5-HT1A_receptor#Neuromodulation).
