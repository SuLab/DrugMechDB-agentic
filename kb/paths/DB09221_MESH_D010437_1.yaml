comment: The drug stimulates the expression of several genes (e.g. HSP, SOD, etc)
  but it's not clear if the drug binds to these or other targets to modulate the known
  actions namely oxygen radical scavenging, anti-oxidation, anti-inflammation, and
  acceleration of gastrointestinal wound healing.
