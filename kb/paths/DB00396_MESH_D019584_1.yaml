comment: Progesterone is prescribed in combination with estradiol as a hormonemtherapy
  during menopause to prevent menopausal flushing and in this case estradiol is the
  acive drug, while progesterone is added for the protection of the endometrium. Please
  refer to this curation DB00783_MESH_D019584_1 for MoA.
