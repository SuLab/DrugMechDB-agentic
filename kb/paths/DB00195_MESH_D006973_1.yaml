comment: L-type calcium channels are modulated by the adrenergic nervous system, hence
  betaxolol could indirectly modulate L calcium channels, decreasing heart rate and
  contraction, ultimately decreasing high blood pressure (https://en.wikipedia.org/wiki/L-type_calcium_channel#Inhibition_and_modulation).
