comment: Calfactant adsorbs rapidly to the surface of the alveolar air-fluid interface
  and modifies surface tension to a minimum of less than 3 mN/m. It acts in a manner
  similar to natural lung surfactant, thus preventing or treating respiratory distress
  syndrome.
