comment: This antibiotic inhbits beta-lactamases, enzymes that break antibiotics and
  therefore provide resistance to ampicillin and related beta-lacam antibiotics. Avibactam
  therefore is useful to treat infections caused by bacteria that are multi-resistant
  to β-lactam antibiotics. The majority of cases of pyelonephritis are caused by E.coli
  (https://en.wikipedia.org/wiki/Pyelonephritis#Causes), hence using this species
  in the indication path here.
