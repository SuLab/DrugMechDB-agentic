comment: This disease is also known as Polycystic kidney disease adult type as per
  the original file. Tolvaptan is also known as aquaretic (https://en.wikipedia.org/wiki/Aquaretic).
  Note that hyponatremia corresponds to the state where water content is relatively
  large for the sodium content available (https://pubmed.ncbi.nlm.nih.gov/19322975/),
  which is possibly due to increased water reabsorption.
