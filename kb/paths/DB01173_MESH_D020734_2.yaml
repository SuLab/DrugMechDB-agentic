comment: Although the mechanism of action has not been determined, orphenadrine appears
  to be a nonselective  muscarinic antagonist https://en.wikipedia.org/wiki/Orphenadrine#Pharmacology
  Parkinsonian syndromes are often the consequence of a disturbed balance between
  cholinergic and dopaminergic neurotransmission in the basal ganglia caused by a
  decrease in dopamine. Anicholinergic drugs restore the physiological equilibrium
  and has a favourable effect on the rigidity and tremor of and Parkinsonian syndromes
  https://www.cell.com/neuron/fulltext/S0896-6273(19)30563-X.
