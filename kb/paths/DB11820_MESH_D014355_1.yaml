comment: The disease is known as Chagas Disease in MESH (MESH:D014355). The drug is
  metabolized by nitoreductases (https://www.accessdata.fda.gov/drugsatfda_docs/label/2020/213464s000lbl.pdf)
  rather than nitoreductases being the target of this drug (https://go.drugbank.com/drugs/DB11820#BE0010011).
