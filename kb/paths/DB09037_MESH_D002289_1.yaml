comment: Pembrolizumab is indicated for first-line treatment of patients with metastatic
  non-small cell lung cancer whose tumors have high PD-L1 expression [(Tumor Proportion
  Score (TPS) ≥50%)] as determined by an FDA-approved test, with no EGFR or ALK genomic
  tumor aberrations
