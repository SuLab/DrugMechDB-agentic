comment: Balsalazide is a prodrug and it releases mesalazine in the large intestine,
  the active site of ulcerative colitis (https://en.wikipedia.org/wiki/Balsalazide
  https://en.wikipedia.org/wiki/Mesalazine#Chemistry).
