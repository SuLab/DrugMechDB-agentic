comment: Please note that the mechanism by which peginterferon beta-1a exerts its
  effects in patients with multiple sclerosis is not fully known. Although DrugBank
  states that Peginterferon beta-1a is an Interferon alpha/beta receptor 1 downregulator,
  there is an evidence in the literature showing that Peginterferon beta-1a is in
  fact Interferon alpha/beta receptor 1 activator https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4303928/
