comment: Different bacterial species can cause pneumonia, the most frequent ones are
  Streptococcus pneumoniae, Staphylococcus aureus, and Bacillus anthracis, among the
  gram-positive types of bacteria. Gram-negative examples of bacteria causing pneumonia
  are Haemophilus influenzae, Klebsiella pneumoniae and Escherichia coli.
