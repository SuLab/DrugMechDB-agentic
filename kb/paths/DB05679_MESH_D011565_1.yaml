comment: This drug binds to the p-40 subunit (UniProt:P29460) of both IL-12 (UniProt:P29459)
  and IL-23 (UniProt:Q9NPF7) so that they subsequently cannot bind to their receptors
  (https://en.wikipedia.org/wiki/Ustekinumab#Mechanism_of_action).
