comment: There appears to be no connection between Niacin deficiency and nicotine.
  Although niacin and nicotine are somehow related (nicotine can turn into nicotinic
  acid via oxidation), nicotine may not be able to replace niacin as treatment for
  Niacin deficiency. Actually nicotine could compete with niacin for binding sites
  in the enzymes necessary for vitamin B3 metabolism, and therefore would decrease
  the amount of B3 available for the cells.
