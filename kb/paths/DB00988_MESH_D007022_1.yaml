comment: Dopamine binds to alpha-1 and beta-1 adrenergic receptors. Alpha-1 adrenergic
  receptor stimulation on vascular smooth muscle leads to vasoconstriction and results
  in an increase in systemic vascular resistance (https://pubchem.ncbi.nlm.nih.gov/compound/681).
