comment: Note that the combination therapy of estradiol and drospirenone would be
  more effective at treating atrophic vaginitis, than a mono-therapy relying on progestin
  only. Also, since many progestogens have off-target effects including estrogenic
  effects, the improvement in hot flashes maybe due to the drug binding to estrogen
  receptors instead.
