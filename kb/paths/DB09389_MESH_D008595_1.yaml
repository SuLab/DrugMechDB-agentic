comment: Norgestrel is composed of a racemic mixture of two stereoisomers, dextronorgestrel
  and levonorgestrel. However, only the levorotary enantiomer (levonorgestrel) is
  biologically active. There is an evidence indicating that levonorgestrel activates
  progesteron receptor https://pubmed.ncbi.nlm.nih.gov/16112947/
