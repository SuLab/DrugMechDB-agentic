comment: The activation of Atrial natriuretic peptide receptor 1 has been observed
  in vitro (https://pubmed.ncbi.nlm.nih.gov/12890708/) and it's reported in DrugBank
  whereas ChEMBL favours the Soluble Guanylyl Cyclase route. Also note that when the
  drug is admnistered at low doses, it dilates veins and reduces the volume of blood
  in the heart after filling (this is supposedly the main mechanism of action). At
  higher doses, it dilates arteries as well.
