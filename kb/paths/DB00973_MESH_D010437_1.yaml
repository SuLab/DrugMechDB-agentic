comment: The drug can be useful for cases where the cause of peptic ulcer is due to
  emotional/somatic factors. Also if used in combination with clinidium (DB:DB00771,
  brand name Librax), it will inhibit acid secretion (antisecretory effect) and will
  be beneficial for treating ulcers (https://go.drugbank.com/unearth/q?utf8=%E2%9C%93&searcher=drugs&query=Librax).
