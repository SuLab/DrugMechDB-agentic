comment: Norgestrel is composed of a racemic mixture of two stereoisomers, dextronorgestrel
  and levonorgestrel. However, only the levorotary enantiomer (levonorgestrel) is
  biologically active. Norgestrel is prescribed in combination with estradiol as a
  hormone therapy during menopause to prevent osteoporosis and in this case estradiol
  is the acive drug that prevents oseoporosis, while norgestrel is added for the protection
  of the endometrium
