name: QC gate

# Deterministic, offline QC gate (scripts/qc.py) for path records.
#
# What CI checks (and, deliberately, what it does NOT):
#   - Layers run: 1 (schema), 2 (node ontology), 3 (predicate enum).
#   - Layer 4 (verbatim snippet check) is SKIPPED via --no-verbatim. Verbatim is
#     enforced once, at curation time, against the full-text-bearing cache; the
#     full text is then deleted before the PR, so the committed corpus no longer
#     carries the bodies needed to re-run it. The remaining layers are source-free
#     and fully reproducible offline.
#   - The semantic critic does NOT run in CI: it is non-deterministic and its
#     source papers are read in-memory at curation time and never committed.
#
# Two scopes:
#   - "Changed paths" (BLOCKING): every record a PR adds/modifies must pass
#     layers 1-3. Because those layers are per-record (no cross-file coupling),
#     this strict gate guarantees a PR can never introduce a new layer-1/2/3
#     failure — the corpus failure count can only go down over time.
#   - "Corpus health" (NON-BLOCKING): runs layers 1-3 over all kb/paths so
#     maintainers can watch the pre-existing legacy debt (known node-ontology
#     mismatches) trend toward zero. Once it reaches zero this can be promoted
#     to a blocking full-corpus gate.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'kb/paths/**'
      - 'references_cache/**'

# Cancel superseded runs on the same PR.
concurrency:
  group: qc-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qc-gate:
    name: QC gate (changed paths, blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for base..head diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: No full text in the repo (full text is curation-only, deleted pre-PR)
        run: |
          set -euo pipefail
          # Full text is ephemeral: it grounds curation + the semantic critic, then is
          # stripped to abstract-only before the PR (pubmed_fetch.py strip-fulltext).
          # The committed cache must therefore never carry a full_text body. This guard
          # enforces that invariant regardless of whether the strip step was run.
          hits=$(grep -rl '^content_type: full_text' references_cache/ 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::These committed cache files still contain full text (run 'python scripts/pubmed_fetch.py strip-fulltext --all' before the PR):"
            printf '  %s\n' $hits
            exit 1
          fi
          echo "OK: no full_text cache files committed."

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install project + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: QC gate (changed paths)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'validation-override') }}
        run: |
          set -euo pipefail

          # Changed path files (added/copied/modified/renamed — not deleted),
          # excluding the generated index.
          mapfile -t FILES < <(
            git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- 'kb/paths/*.yaml' \
              | grep -v '/_index\.yaml$' || true
          )

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No kb/paths/*.yaml changes to validate."
            exit 0
          fi

          echo "Validating ${#FILES[@]} changed path file(s) on layers 1-3 (no verbatim):"
          printf '  %s\n' "${FILES[@]}"
          echo

          set +e
          # --no-verbatim: skip Layer 4 (full text is deleted before the PR).
          python scripts/qc.py --no-verbatim --offline "${FILES[@]}"
          code=$?
          set -e

          if [ "$code" -ne 0 ]; then
            if [ "$OVERRIDE" = "true" ]; then
              echo "::warning::QC gate failed (exit $code) but the 'validation-override' label is present — not blocking merge."
              exit 0
            fi
            echo "::error::QC gate failed (exit $code). Fix the flagged path(s), or apply the 'validation-override' label (maintainer approval) to bypass."
            exit "$code"
          fi
          echo "QC gate passed."

      - name: Corpus health (all paths, non-blocking)
        if: always()
        run: |
          set +e
          echo "Layers 1-3 (no verbatim) over the full corpus — informational only."
          echo "Pre-existing legacy node-ontology debt is expected here and does NOT block the PR;"
          echo "the changed-paths gate above guarantees this PR adds none."
          python scripts/qc.py --no-verbatim --offline kb/paths/
          echo "(corpus-health step is non-blocking)"
          exit 0
