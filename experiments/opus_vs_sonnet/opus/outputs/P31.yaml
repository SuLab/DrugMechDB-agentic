  - key: increases activity of
    source: UniProt:P04275
    target: UniProt:P00451
    evidence:
      - reference: PMID:12826528
        snippet: "recent biochemical investigations have confirmed that VWF is a key partner for FVIII, playing significant roles in FVIII function, its production and its stabilization"
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: "von Willebrand factor binds and stabilizes coagulation factor VIII in plasma, sustaining functional FVIII levels."
      - reference: PMID:28581694
        snippet: "VWF serving as the carrier for FVIII. VWF indirectly influences secondary hemostasis by stabilizing FVIII and transporting it to the site of primary hemostasis."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        explanation: "By stabilizing and carrying factor VIII, von Willebrand factor sustains functional plasma FVIII levels."
  - key: treats
    source: UniProt:P00451
    target: MESH:D006467
    evidence:
      - reference: PMID:23265678
        snippet: "Desmopressin is a synthetic vasopressin analog that increases the plasma levels of coagulation factor VIII, von Willebrand factor, and tissue plasminogen activator."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Raising plasma coagulation factor VIII corrects the FVIII deficiency underlying hemophilia A."
      - reference: PMID:23265678
        snippet: "has been approved for use in the prevention and treatment of hemorrhagic events during surgery in patients with hemophilia A"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Vasopressin analogue desmopressin is approved to treat bleeding in hemophilia A via increased factor VIII."
