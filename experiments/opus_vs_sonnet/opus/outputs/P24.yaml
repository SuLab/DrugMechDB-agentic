  - key: participates in
    source: UniProt:P12268
    target: GO:0006177
    evidence:
      - reference: PMID:10878285
        snippet: "an inhibitor of inosine monophosphate dehydrogenase (IMPDH). This is the rate-limiting enzyme in de novo synthesis of guanosine nucleotides."
        supports: SUPPORT
        evidence_source: OTHER
  - key: negatively regulates
    source: MESH:D015232
    target: GO:0046651
    evidence:
      - reference: PMID:8680053
        snippet: "By inhibiting IMPDH, MPA depletes the pool of dGTP required for DNA synthesis. MPA has a more potent cytostatic effect on lymphocytes than on other cell types"
        supports: SUPPORT
        evidence_source: IN_VITRO
      - reference: PMID:22571761
        snippet: "MPA abrogated in vitro proliferation of purified B cells completely but had only moderate impact on B cell survival."
        supports: SUPPORT
        evidence_source: IN_VITRO
  - key: causes
    source: GO:0046651
    target: MESH:D008181
    evidence:
      - reference: PMID:22571761
        snippet: "The thorough inhibition of B cell activation and plasma cell formation by MMF might explain the favorable outcomes of previous clinical trials in patients with SLE, since enhanced B cell proliferation is a hallmark of this disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Enhanced lymphocyte (B cell) proliferation drives SLE/lupus nephritis pathology; MMF acts by suppressing it."
