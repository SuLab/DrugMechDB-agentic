    evidence:
      - reference: PMID:37011015
        snippet: "Glycogen Synthase Kinase 3β (GSK3 β) phosphorylates and degrades catenin via the downstream Wnt signalling pathway"
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: "GSK-3 beta phosphorylates and degrades beta-catenin; its inhibition stabilizes beta-catenin."
      - reference: PMID:30336136
        snippet: "lithium chloride inhibited glycogen synthase kinase-3β activation, which on one hand, suppressed downstream CRMP-2/NR2B, thus diminishing the excitotoxic index level; and on the other, stabilized β-catenin"
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        explanation: "GSK-3 beta inhibition by lithium stabilizes beta-catenin."
