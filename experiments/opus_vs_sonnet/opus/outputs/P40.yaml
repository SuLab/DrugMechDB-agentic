    target: GO:0043303
    evidence:
      - reference: PMID:26509363
        snippet: "We found that OmAb dissociates pre-bound IgE from mast cells and basophils, resulting in a reduction of proximal phosphorylation-mediated signalling events (Syk, PLCγ, and LAT) and in a decrease in degranulation and leukotriene synthesis."
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: "Loss of IgE-FcepsilonRI signalling reduces mast cell degranulation."
  - key: causes
