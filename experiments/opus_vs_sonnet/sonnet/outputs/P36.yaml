links:
  - key: disrupts
    source: MESH:D006096
    target: GO:0005886
    evidence:
      - reference: PMID:35872830
        snippet: >-
          1 folds into a β6.3-helix in a lipid bilayer and forms a head-to-head
          dimer to function as a transmembrane channel for monovalent cations
          (H+, Na+, and K+)
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: >-
          Gramicidin A inserts into the lipid bilayer and forms transmembrane ion
          channels, thereby disrupting the plasma membrane barrier function.
      - reference: PMID:29501941
        snippet: >-
          upon insertion into membranes, it forms channels that disrupts ion
          gradients
        supports: SUPPORT
        evidence_source: IN_VITRO
  - key: participates in
    source: GO:0005886
    target: GO:0006811
    evidence:
      - reference: PMID:35872830
        snippet: >-
          Compound 1 not only disrupted the ion concentration gradients of the
          plasma membrane
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: >-
          The gramicidin-permeabilized plasma membrane participates in aberrant
          ion transport; monovalent cations flow freely through gramicidin
          channels, dissipating normal ion concentration gradients.
  - key: causes
    source: GO:0006811
    target: GO:0031640
    evidence:
      - reference: PMID:24356337
        snippet: >-
          Changes in the conductance of membranes for ions will lead to cell
          death
        supports: SUPPORT
        evidence_source: IN_VITRO
      - reference: PMID:24356337
        snippet: >-
          Gramicidin channels inserted into the cancer cells open flux of
          protons into the cytoplasm and disrupt balance of other monovalent
          cations, which induces cell apoptosis
        supports: PARTIAL
        evidence_source: IN_VITRO
        explanation: >-
          Gramicidin-mediated uncontrolled ion transport through the membrane
          causes cell death. Evidence shown in cancer cells but the
          ion-channel-disruption mechanism applies to bacterial cells.
  - key: treats
    source: GO:0031640
    target: MESH:D003234
    evidence:
      - reference: PMID:12429243
        snippet: >-
          Povidone-iodine 1.25% ophthalmic solution was as effective as
          neomycin-polymyxin B-gramicidin for treating bacterial conjunctivitis
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: >-
          Gramicidin-containing ophthalmic solution treats bacterial
          conjunctivitis in a controlled clinical trial; the killing of bacteria
          by gramicidin underlies this therapeutic effect.
      - reference: PMID:20084257
        snippet: >-
          Good choices include polymyxin/gramicidin, polymyxin/trimethoprim or
          sulfacetamide
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: >-
          Clinical review identifies polymyxin/gramicidin as a recommended
          first-line agent for bacterial conjunctivitis in children.
