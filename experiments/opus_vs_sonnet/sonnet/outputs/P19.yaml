  - key: contributes to
    source: GO:0007269
    target: MESH:D004827
    evidence:
      - reference: PMID:18590620
        snippet: Functionally, all of the new targets modulate neurotransmitter output at synapses, focusing attention on presynaptic terminals as critical sites of action for AEDs.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Excessive neurotransmitter secretion at synapses contributes to neuronal hyperexcitability and seizure generation in epilepsy; modulation of presynaptic neurotransmitter output is the key mechanism through which AEDs including gabapentin treat epilepsy.
