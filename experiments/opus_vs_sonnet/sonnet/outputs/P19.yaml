        snippet: Gabapentin and pregabalin may bind to the Ca(2+) channel alpha 2 delta subunit to selectively attenuate depolarization-induced Ca(2+) influx of presynaptic P/Q-type Ca(2+) channels
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: The alpha-2-delta subunit modulated by gabapentin decreases activity of the P/Q-type voltage-gated calcium channel, reducing Ca2+ influx.
