  - key: binds
    source: MESH:D014640
    target: CHEBI:83419
    evidence:
      - reference: PMID:33458529
        snippet: Vancomycin inhibits cell wall biosynthesis by targeting lipid II, which is the membrane-bound peptidoglycan precursor. The heptapeptide aglycon structure of vancomycin binds to the d-Ala-d-Ala of the pentapeptide stem structure in lipid II.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Vancomycin binds the D-Ala-D-Ala terminus of the peptidoglycan precursor lipid II.
  - key: negatively regulates
    source: CHEBI:83419
    target: GO:0009252
    evidence:
      - reference: PMID:31899563
        snippet: Vancomycin forms an intricate network of hydrogen bonds with the d-Ala-d-Ala region of Lipid II, interfering with the peptidoglycan layer maturation process.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Vancomycin binding to Lipid II interferes with peptidoglycan layer maturation (biosynthetic process).
  - key: negatively regulates
    source: GO:0009252
    target: NCBITaxon:1280
    evidence:
      - reference: PMID:19576226
        snippet: Our results show the accumulation of peptidoglycan precursors after vancomycin treatment, consistent with transglycosylase inhibition
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Inhibition of peptidoglycan biosynthesis (transglycosylase inhibition) leads to accumulation of precursors and impaired Staphylococcus aureus cell wall synthesis.
  - key: treats
