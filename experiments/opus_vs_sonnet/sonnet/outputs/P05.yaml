  - key: positively regulates
    source: UniProt:Q9H244
    target: GO:0070527
    evidence:
      - reference: PMID:29439388
        snippet: Adenosine diphosphate (ADP) is the major platelet agonist, which is important in the shape changes, stability, and growth of the thrombus.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: P2Y12 is an ADP receptor; ADP acting through P2Y12 positively regulates platelet aggregation. The pharmacologic blockade of P2Y12 reduces platelet aggregation (per the same paper).
      - reference: PMID:23885646
        snippet: Clopidogrel is a thienopyridine that selectively and irreversibly inhibits the ADP purinergic receptor P2Y12 and the subsequent ADP-mediated platelet activation.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Shows that P2Y12 mediates ADP-driven platelet activation, supporting that P2Y12 positively regulates platelet aggregation.
  - key: contributes to
    source: GO:0070527
    target: MESH:D020521
    evidence:
      - reference: PMID:22393298
        snippet: Platelet activation and aggregation play a seminal role in the arterial thrombus formation that precipitates acute manifestations of atherothrombotic disease.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Establishes platelet aggregation as contributing to arterial thrombus formation, which causes ischemic stroke (an atherothrombotic disease manifestation).
      - reference: PMID:35094598
        snippet: An abundance of evidence supports aspirin and clopidogrel use for secondary stroke prevention.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Clinical evidence that antiplatelet therapy (clopidogrel) prevents stroke, implicating platelet aggregation in stroke pathogenesis.
