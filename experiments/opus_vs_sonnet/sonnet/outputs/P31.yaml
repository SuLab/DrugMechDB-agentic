        explanation: cAMP-mediated signaling downstream of V2 receptor activation leads to exocytosis from Weibel-Palade bodies.
  - key: positively regulates
    source: GO:0099132
    target: UniProt:P04275
    evidence:
      - reference: PMID:26473492
        snippet: VWF is synthesized in megakaryocytes and endothelial cells, and is stored and secreted from platelet alpha granules and Weibel-Palade bodies of endothelial cells.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Weibel-Palade body exocytosis releases stored VWF into plasma, raising circulating VWF levels.
      - reference: PMID:40290674
        snippet: DDAVP elicits the release of von Willebrand Factor (VWF) from endothelial cells, thereby increasing the levels of circulating VWF and coagulation factor (F)VIII.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
  - key: positively regulates
    source: UniProt:P04275
    target: UniProt:P00451
    evidence:
      - reference: PMID:26473492
        snippet: FVIII stability and half-life is dependent on non-covalent complex formation with von Willebrand factor (VWF) to avoid proteolysis and clearance.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: VWF forms a non-covalent complex with FVIII, stabilizing it against proteolysis and prolonging its half-life in circulation.
  - key: treats
    source: UniProt:P00451
    target: MESH:D006467
    evidence:
      - reference: PMID:20829683
        snippet: Owing to its ability to raise plasma levels of factor VIII and von Willebrand factor levels, the synthetic vasopressin analogue desmopressin has become the mainstay of treatment for type 1 von Willebrand disease and mild hemophilia A.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Raising plasma factor VIII levels is the mechanism by which desmopressin/vasopressin treats mild hemophilia A.
