        snippet: via activation of endothelial vasopressin V2R receptor and cAMP-mediated signaling. This leads to exocytosis from Weibel Palade bodies where both VWF and t-PA are stored
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Activation of the V2 receptor increases cAMP-mediated signaling, which drives Weibel-Palade body exocytosis.
  - key: positively regulates
    source: GO:0019933
