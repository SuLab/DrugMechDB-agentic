    target: UniProt:P30518
    evidence:
      - reference: PMID:12871401
        snippet: Its effect on VWF and t-PA as well as its vasodilatory effect are likely explained by a direct action on the endothelium, via activation of endothelial vasopressin V2R receptor and cAMP-mediated signaling.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: DDAVP (the synthetic vasopressin analogue) activates the endothelial vasopressin V2 receptor (AVPR2), initiating cAMP-mediated signaling.
  - key: increases activity of
