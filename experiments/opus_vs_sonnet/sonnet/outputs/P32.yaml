        snippet: vitamin C deficiency, impairing collagen synthesis and leading to typical scurvy symptoms
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Deficiency in collagen synthesis caused by insufficient ascorbic acid leads to the clinical manifestations of scurvy (ascorbic acid deficiency disease).
      - reference: PMID:32517792
        snippet: Severe vitamin C deficiency, or scurvy, encompasses a syndrome of multisystem abnormalities due to defective collagen synthesis and antioxidative functions.
