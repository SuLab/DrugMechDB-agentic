    evidence:
      - reference: PMID:41980618
        snippet: Ascorbic acid (AA) is known to act as a cofactor for collagen-modifying enzymes (collagen prolyl and lysyl hydroxylases) and is vital for collagen thermal stability, proper folding, and fibrillogenesis.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Prolyl 4-hydroxylase catalyzes the hydroxylation of proline residues in procollagen, an essential step in collagen biosynthesis required for thermal stability and triple helix formation.
      - reference: PMID:10329688
        snippet: The accumulation of these partially folded intermediates occurs during vitamin C deficiency due to incomplete proline hydroxylation, as vitamin C is an essential co-factor of the enzyme prolyl 4-hydroxylase.
        supports: SUPPORT
        evidence_source: IN_VITRO
