links:
  - key: decreases activity of
    source: MESH:D006886
    target: UniProt:Q9NYK1
    evidence:
      - reference: PMID:21398612
        snippet: We conclude that the direct binding of inhibitors to nucleic acids mask their TLR-binding epitope and may explain the efficiency of those compounds in the treatment of autoimmune diseases.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: The study demonstrates that antimalarial drugs including hydroxychloroquine inhibit endosomal TLR activation by directly binding to nucleic acids and masking their TLR-binding epitope, including TLR7.
      - reference: PMID:24342772
        snippet: Our data also confirm an earlier report that this same mechanism may explain inhibition of TLR7 and 9 signaling by hydroxychloroquine (Plaquenil; Sanofi-Aventis, Bridgewater, NJ), a drug commonly prescribed to treat lupus.
        supports: SUPPORT
        evidence_source: IN_VITRO

  - key: decreases activity of
    source: MESH:D006886
    target: UniProt:Q9NR96
    evidence:
      - reference: PMID:21398612
        snippet: Endosomal TLRs play an important role in innate immune response as well as in autoimmune processes. In the therapy of systemic lupus erythematosus, antimalarial drugs chloroquine, hydroxychloroquine, and quinacrine have been used for a long time. Their suppression of endosomal TLR activation has been attributed to the inhibition of endosomal acidification, which is a prerequisite for the activation of these receptors.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: The study demonstrates antimalarial drugs including hydroxychloroquine inhibit endosomal TLR9 activation.
      - reference: PMID:24342772
        snippet: Our data also confirm an earlier report that this same mechanism may explain inhibition of TLR7 and 9 signaling by hydroxychloroquine (Plaquenil; Sanofi-Aventis, Bridgewater, NJ), a drug commonly prescribed to treat lupus.
        supports: SUPPORT
        evidence_source: IN_VITRO

  - key: positively regulates
    source: UniProt:Q9NYK1
    target: GO:0032606
    evidence:
      - reference: PMID:36622335
        snippet: Increased Toll-like receptor 7 (TLR-7) signaling leading to the production of type I interferon (IFN) is an important contributor to human systemic lupus erythematosus (SLE).
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
      - reference: PMID:30846987
        snippet: PDCs were the only producers of IFNα in response to CpG-A, R848, and ssRNA stimulation in PBMC cultures. CLE patients with higher levels of blood HCQ showed lower ex vivo pDC responses to CpG-A, but not R848 or ssRNA.
        supports: PARTIAL
        evidence_source: HUMAN_CLINICAL
        explanation: CpG-A stimulates TLR9 and R848/ssRNA stimulate TLR7/8; the pDC IFNα production is shown to be downstream of TLR activation.

  - key: positively regulates
    source: UniProt:Q9NR96
    target: GO:0032606
    evidence:
      - reference: PMID:32714335
        snippet: They are also known to interfere with endosomal Toll-like receptors signaling and cytosolic sensors of nucleic acids, which result in a decreased cellular activation and thereby a lower type I interferons and inflammatory cytokine secretion.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Blocking endosomal TLR signaling (including TLR9) reduces type I IFN production, confirming TLR9 positively regulates type I IFN production.
      - reference: PMID:30846987
        snippet: Our findings reveal that clinically-relevant HCQ concentrations partially inhibit the pDC response to TLR9 and weakly affect the response to TLR7/8 stimulation.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: HCQ inhibits pDC IFNα production via TLR9, confirming TLR9 drives type I IFN production.

  - key: contributes to
    source: GO:0032606
    target: MESH:D008180
    evidence:
      - reference: PMID:26099519
        snippet: One of the most prominent features, shared by the majority of patients with SLE, is a continuous activation of the type I interferon (IFN) system, which manifests as increased serum levels of IFNα and/or an increased expression of type I IFN-induced genes, a so-called type I IFN signature.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
      - reference: PMID:32185249
        snippet: Type I interferons secreted by plasmacytoid dendritic cells (pDCs) play a crucial role in the pathogenesis of systemic lupus erythematosus by driving the formation of autoantibodies against nuclear debris.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL

