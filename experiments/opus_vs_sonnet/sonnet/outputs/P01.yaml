links:
  - key: decreases activity of
    source: MESH:D001241
    target: UniProt:P23219
    evidence:
      - reference: PMID:18855644
        snippet: Aspirin works by irreversibly acetylating the cyclooxygenase (COX-1) enzyme, thus suppressing the production of thromboxane A(2) (TxA(2)) and inhibiting platelet activation and aggregation.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Directly states aspirin irreversibly acetylates COX-1, decreasing its activity.
      - reference: PMID:26139061
        snippet: Inactivation of platelet cyclooxygenase (COX)-1 by low-dose aspirin leads to long-lasting suppression of thromboxane (TX) A2 production and TXA2-mediated platelet activation and aggregation.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: States that aspirin inactivates COX-1, confirming decreases activity of relationship.
  - key: positively regulates
    source: UniProt:P23219
    target: MESH:D013931
    evidence:
      - reference: PMID:11552047
        snippet: Cox-1 catalyzes the synthesis of thromboxane A2 (Tx-A2), which causes platelet activation, vasoconstriction, and smooth muscle proliferation.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Directly states COX-1 catalyzes synthesis of TXA2, establishing COX-1 positively regulates TXA2 production.
      - reference: PMID:19110389
        snippet: Aspirin irreversibly inhibits cyclooxygenase (COX) 1 involved in the platelet production of thromboxane (TX) A(2), an inducer of vasoconstriction and a platelet activating agent.
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: States COX-1 is involved in platelet production of TXA2, supporting positive regulation.
  - key: positively regulates
