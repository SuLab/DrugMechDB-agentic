    evidence:
      - reference: PMID:31886264
        snippet: These changes activate the cellular energy sensor AMP-activated protein kinase (AMPK). Thus, the increased cellular AMP/ATP ratio causes a dramatic and progressive activation
        supports: SUPPORT
        evidence_source: IN_VITRO
        explanation: Inhibition of complex I raises the AMP/ATP ratio, which activates AMPK.
      - reference: PMID:23710432
        snippet: These drugs, such as metformin and STZ, inhibit ATP synthesis in mitochondria to raise AMP/ATP ratio in the process of AMPK activation.
        supports: SUPPORT
