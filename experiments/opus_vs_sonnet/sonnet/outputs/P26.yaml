  - key: negatively regulates
    source: UniProt:Q13131
    target: GO:0006094
    evidence:
      - reference: PMID:16308421
        snippet: TORC2 is a critical target of LKB1/AMPK signals in the regulation of gluconeogenesis. Finally, we show that metformin, one of the most widely prescribed type 2 diabetes therapeutics, requires LKB1 in the liver to lower blood glucose levels.
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        explanation: AMPK (activated via LKB1) negatively regulates gluconeogenesis via TORC2 suppression.
      - reference: PMID:34502359
        snippet: Metformin, which is widely prescribed for type 2 diabetes mellitus (T2DM) patients, regulates blood sugar by inhibiting hepatic gluconeogenesis and promoting insulin sensitivity to facilitate glucose uptake by cells.
        supports: SUPPORT
        evidence_source: OTHER
        explanation: AMPK activation by metformin is responsible for inhibiting hepatic gluconeogenesis.
  - key: treats
    source: GO:0006094
    target: MESH:D003924
    evidence:
      - reference: PMID:25849133
        snippet: Metformin lowers blood glucose levels by inhibiting hepatic glucose production (HGP), an effect originally postulated to be due to a hepatic AMP-activated protein kinase (AMPK)-dependent mechanism.
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        explanation: Inhibition of gluconeogenesis (hepatic glucose production) by the AMPK pathway lowers blood glucose, treating type 2 diabetes.
      - reference: PMID:15669880
        snippet: reduce hepatic glucose production (biguanides)
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: Biguanides like metformin treat type 2 diabetes by reducing hepatic glucose production, establishing the link between gluconeogenesis inhibition and disease treatment.
