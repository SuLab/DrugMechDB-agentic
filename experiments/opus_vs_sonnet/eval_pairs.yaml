# Opus-vs-Sonnet curation eval — 40-pair stratified set
#
# PURPOSE
#   Decide whether claude-opus-4-8 or claude-sonnet-4-6 should be the single
#   DrugMechDB curation agent. Each pair is curated independently by BOTH models
#   under identical /curate framing; outputs are scored by the 4-layer QC gate
#   (ai_curated profile) + (later) the semantic critic.
#
# SELECTION RATIONALE
#   Base set (P01-P30): the existing docs/phase3_eval_pairs.yaml stratified set —
#   6 drug classes x ~5 each, 7 disease areas, 22 in-corpus / 8 net-new. It already
#   spans the high-frequency middle of the corpus (Protein/BiologicalProcess/Disease/
#   Drug nodes, 4-6 link paths), which is where the bulk of DrugMechDB lives.
#
#   Extension set (P31-P40): 10 pairs chosen to cover demographic niches the base set
#   under-represents, measured against a 800-record corpus sample:
#     - path-length tails: the corpus mode is 4-6 links but there is a real
#       short tail (1-2 links, ~5%) and a long tail (10+ links, ~12%). Base set is
#       almost entirely 3-7 links. P31-P32 add short; P33-P34 add long.
#     - OrganismTaxon-heavy infectious/antiviral/antiparasitic paths (238/800 sampled
#       records carry an OrganismTaxon node) — P35-P36.
#     - GeneFamily nodes (InterPro; 201/800) — P37.
#     - ChemicalSubstance-heavy metabolic/replacement paths (344/800) — P38.
#     - edge cases: a drug that is itself an endogenous substance / replacement
#       therapy (P39, levothyroxine — thin mechanism, easy to over-curate), and a
#       monoclonal antibody with a long immunological cascade (P40, omalizumab —
#       long path + branch-convergence, a known hard curation shape).
#   All 10 extension pairs correspond to real existing corpus records (legacy_path_id
#   given) so the agent output can be compared against curator work, same as the
#   in-corpus base pairs.
#
#   Demographic coverage of the full 40:
#     drug_class:   cardiovascular, oncology, antimicrobial, cns, immunomodulator,
#                   endocrine, antiviral, antiparasitic, replacement, hematologic
#     disease_area: cardiovascular, cancer, infectious, neurological, autoimmune,
#                   metabolic, hematologic, allergy
#     path length:  1-2 (short), 3-7 (mode), 8-14 (long)
#     node niches:  OrganismTaxon, GeneFamily, ChemicalSubstance-heavy, replacement
#
# NOTE: this file is the experiment input. Outputs land ONLY under
# experiments/opus_vs_sonnet/{opus,sonnet}/outputs/ — never kb/paths/.

